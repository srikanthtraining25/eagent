# ==============================================================
# Enterprise Agent — Docker Compose
# Services: app (FastAPI + Temporal Worker), temporal, postgres, redis
# ==============================================================

services:
  # --- Application: FastAPI Gateway + Temporal Worker ---
  app:
    build: .
    container_name: enterprise-agent
    ports:
      - "${APP_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      - TEMPORAL_HOST=temporal
      - REDIS_HOST=redis
      - REDIS_URL=redis://redis:6379/0
      - POSTGRES_HOST=postgres
    depends_on:
      temporal:
        condition: service_started
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    command: >
      sh -c "
        python -m app.main &
        uvicorn app.api.server:app --host 0.0.0.0 --port 8000 --reload
      "
    volumes:
      - .:/app
    networks:
      - agent-network

  # --- Temporal Server (Dev Mode) ---
  temporal:
    image: temporalio/auto-setup:latest
    container_name: temporal-server
    ports:
      - "7233:7233"    # gRPC
      - "8233:8233"    # Web UI
    environment:
      - DB=postgresql
      - DB_PORT=${POSTGRES_PORT:-5432}
      - POSTGRES_USER=${POSTGRES_USER:-temporal}
      - POSTGRES_PWD=${POSTGRES_PASSWORD:-temporal}
      - POSTGRES_SEEDS=postgres
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - agent-network

  # --- PostgreSQL (Temporal backend) ---
  postgres:
    image: postgres:16-alpine
    container_name: agent-postgres
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-temporal}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-temporal}
      POSTGRES_DB: ${POSTGRES_DB:-temporal}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-temporal}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - agent-network

  # --- Redis (LangGraph Checkpoints + FastA2A Storage + Chat History) ---
  redis:
    image: redis:7-alpine
    container_name: agent-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: >
      redis-server
      --requirepass "${REDIS_PASSWORD:-}"
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - agent-network

volumes:
  postgres-data:
  redis-data:

networks:
  agent-network:
    driver: bridge
